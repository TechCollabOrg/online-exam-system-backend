server:
  port: 8080 # 允许端口号
spring:
  main:
    # 关闭banner
    banner-mode: console
    # 允许循环引用
    allow-circular-references: true
  # mysql配置（敏感项通过环境变量注入，见仓库根目录 env.example）
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/db_exam?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USERNAME:root}
    # 本地默认密码（含末尾句点须加引号，避免 YAML/占位符歧义）；生产用 MYSQL_PASSWORD
    password: "${MYSQL_PASSWORD:100070Td.}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  # redis配置
  redis:
    database: ${REDIS_DATABASE:0}
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 10s
    lettuce: # Redis连接池配置
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
  servlet:
    multipart:
      max-file-size: 5MB
#MybatisPlus配置
mybatis-plus:
  global-config:
    banner: false
    db-config:
      logic-not-delete-value: 0
      logic-delete-value: 1
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case:
  type-aliases-package: cn.org.alan.exam.model

# jwt 配置（生产务必设置 JWT_SECRET，勿使用默认值）
jwt:
  secret: ${JWT_SECRET:dev-only-change-me-use-a-long-random-string}
  expiration: 1800000
  refreshThreshold: 900000

# 阿里云 OSS（仅 storage.type=aliyun 时使用；密钥勿提交到 Git）
oss:
  endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:online-exam-system-backend}

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  accesskey: ${MINIO_ACCESS_KEY:admin}
  secretKey: ${MINIO_SECRET_KEY:changeme}
  bucket: ${MINIO_BUCKET:online-exam}

# Coze（仅 online-exam.chat-platform.type=coze 时加载）
coze:
  api:
    base-url: ${COZE_API_BASE_URL:https://api.coze.cn}
    token: ${COZE_API_TOKEN:}
    bot: ${COZE_BOT_ID:}

# Dify（仅 type=dify 时加载）
dify:
  base-url: ${DIFY_BASE_URL:https://api.dify.ai/v1/chat-messages}
  api-key: ${DIFY_API_KEY:}

# LLM / 向量（仅 type=llm 等场景使用）
llm:
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:https://api.siliconflow.cn/v1}
  model: ${LLM_MODEL:deepseek-ai/DeepSeek-V3}

embedding:
  api-key: ${EMBEDDING_API_KEY:}
  base-url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1/embeddings}
  model: ${EMBEDDING_MODEL:BAAI/bge-large-zh-v1.5}

milvus:
  username: ${MILVUS_USERNAME:root}
  password: ${MILVUS_PASSWORD:}
  host: ${MILVUS_HOST:127.0.0.1}
  port: ${MILVUS_PORT:19530}

logging:
  level:
    root: info
    com.example: debug

online-exam:
  crypto:
    # 须与前端 VUE_APP_CRYPTO_KEY / VUE_APP_CRYPTO_IV 一致（各 16 字符）
    aes-key: ${EXAM_AES_KEY:changeme16byte!!}
    aes-iv: ${EXAM_AES_IV:changeme16byte!!}
  chat-platform:
    type: coze # coze、llm、dify
  storage:
    # local：写入项目目录下 uploads，无需 MinIO；minio：需本机 127.0.0.1:9000 已启动并配置桶
    type: ${STORAGE_TYPE:local}
    local-dir: ${LOCAL_UPLOAD_DIR:uploads/exam-files}
  login:
    captcha:
      enabled: true
system:
  register:
    enabled: true
