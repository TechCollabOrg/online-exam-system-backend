server:
  port: ${SERVER_PORT:8080}
spring:
  main:
    banner-mode: console
    allow-circular-references: true
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    database: ${REDIS_DATABASE:0}
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 10s
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0
  servlet:
    multipart:
      max-file-size: 5MB
mybatis-plus:
  global-config:
    banner: false
    db-config:
      logic-not-delete-value: 0
      logic-delete-value: 1
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case:
  type-aliases-package: cn.org.alan.exam.model

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:1800000}
  refreshThreshold: ${JWT_REFRESH_THRESHOLD_MS:900000}

oss:
  endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:online-exam-system-backend}

minio:
  endpoint: ${MINIO_ENDPOINT}
  accesskey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:online-exam}

logging:
  level:
    root: info
    com.example: debug

online-exam:
  crypto:
    aes-key: ${EXAM_AES_KEY}
    aes-iv: ${EXAM_AES_IV}
  chat-platform:
    type: ${CHAT_PLATFORM_TYPE:coze}
  storage:
    type: ${STORAGE_TYPE:minio}
    local-dir: ${LOCAL_UPLOAD_DIR:uploads/exam-files}
  login:
    captcha:
      enabled: ${CAPTCHA_ENABLED:true}
system:
  register:
    enabled: ${REGISTER_ENABLED:true}

coze:
  api:
    base-url: ${COZE_API_BASE_URL:https://api.coze.cn}
    token: ${COZE_API_TOKEN:}
    bot: ${COZE_BOT_ID:}

dify:
  base-url: ${DIFY_BASE_URL:https://api.dify.ai/v1/chat-messages}
  api-key: ${DIFY_API_KEY:}

llm:
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:https://api.siliconflow.cn/v1}
  model: ${LLM_MODEL:deepseek-ai/DeepSeek-V3}

embedding:
  api-key: ${EMBEDDING_API_KEY:}
  base-url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1/embeddings}
  model: ${EMBEDDING_MODEL:BAAI/bge-large-zh-v1.5}

milvus:
  username: ${MILVUS_USERNAME:root}
  password: ${MILVUS_PASSWORD:}
  host: ${MILVUS_HOST:127.0.0.1}
  port: ${MILVUS_PORT:19530}
